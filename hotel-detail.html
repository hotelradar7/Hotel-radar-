<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF9F6">
<title>Hotel Details — HotelRadar</title>
<meta name="description" content="View hotel details, amenities, and reviews.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-mark">H</div>
      <span class="brand-name">HotelRadar</span>
    </a>
    <div class="topbar-actions">
      <a href="wishlist.html" class="icon-btn" aria-label="My wishlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="badge-dot" id="topbarWishlistDot" style="display:none"></span>
      </a>
      <button class="icon-btn" id="menuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="menu-overlay" id="menuOverlay"></div>
<nav class="menu-panel" id="menuPanel" aria-label="Site menu">
  <div class="menu-head">
    <span class="menu-head-title">Menu</span>
    <button class="icon-btn" id="menuClose" aria-label="Close menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="menu-theme-row">
    <span class="menu-theme-label">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      Night mode
    </span>
    <div class="theme-switch" id="themeSwitch" role="switch" aria-checked="false" aria-label="Toggle night mode">
      <div class="theme-switch-knob"></div>
    </div>
  </div>
  <div class="menu-list">
    <a href="index.html" class="menu-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Home
    </a>
    <a href="hotels.html" class="menu-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
      Browse hotels
    </a>
    <a href="wishlist.html" class="menu-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      My wishlist
      <span class="count-pill" id="menuWishlistCount" style="display:none">0</span>
    </a>
    <a href="about.html" class="menu-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      About us
    </a>
    <a href="contact.html" class="menu-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Contact
    </a>
  </div>
  <div class="menu-foot">HotelRadar · Made in India</div>
</nav>

<div id="detailRoot">

  <!-- MEDIA -->
  <div class="detail-media" id="detailMedia">
    <span id="detailMediaEmoji">🏨</span>
    <div class="detail-media-actions">
      <a href="index.html" class="media-btn" aria-label="Back" onclick="if(history.length>1){history.back();return false;}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <div class="media-actions-right">
        <button class="media-btn" id="detailFavBtn" aria-label="Save to wishlist">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="detail-crumb" id="detailCrumb"></div>
    <div class="detail-tags" id="detailTags"></div>
    <h1 class="detail-name" id="detailName">Loading…</h1>
    <div class="detail-meta">
      <span class="detail-stars" id="detailStars"></span>
      <span class="detail-score" id="detailScore"></span>
      <span class="detail-reviews" id="detailReviews"></span>
    </div>
    <div class="detail-loc">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="detailLoc"></span>
    </div>

    <!-- TABS -->
    <div class="detail-tabs">
      <button class="dtab active" data-tab="overview">Overview</button>
      <button class="dtab" data-tab="amenities">Amenities</button>
      <button class="dtab" data-tab="reviews">Reviews</button>
      <button class="dtab" data-tab="location" id="dtab-location">Location</button>
    </div>

    <!-- OVERVIEW -->
    <div class="dpanel active" id="dpanel-overview">
      <h3>About this hotel</h3>
      <p id="detailDesc"></p>
      <div class="quickfacts">
        <div class="qfact">
          <div class="qfact-icon">🕐</div>
          <div class="qfact-label">Check-in</div>
          <div class="qfact-value" id="qfCheckin">—</div>
        </div>
        <div class="qfact">
          <div class="qfact-icon">🚪</div>
          <div class="qfact-label">Check-out</div>
          <div class="qfact-value" id="qfCheckout">—</div>
        </div>
        <div class="qfact">
          <div class="qfact-icon">🏨</div>
          <div class="qfact-label">Type</div>
          <div class="qfact-value" id="qfType">—</div>
        </div>
      </div>
    </div>

    <!-- AMENITIES -->
    <div class="dpanel" id="dpanel-amenities">
      <h3>All amenities</h3>
      <div class="amenity-grid2" id="detailAmenities"></div>
    </div>

    <!-- REVIEWS -->
    <div class="dpanel" id="dpanel-reviews">
      <h3>Guest reviews</h3>
      <div id="detailReviewsList"></div>
    </div>

    <!-- LOCATION -->
    <div class="dpanel" id="dpanel-location">
      <h3>Address</h3>
      <p id="detailLoc2" style="margin-bottom:14px"></p>
      <div style="height:180px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--ink-faint)">
        <span style="font-size:28px">🗺️</span>
        <span style="font-size:12.5px">Map preview</span>
      </div>
    </div>
  </div>

  <!-- SIMILAR HOTELS -->
  <section class="section" id="similarSection">
    <div class="container">
      <div class="section-top">
        <div class="section-title" style="font-size:17px">Similar hotels</div>
      </div>
      <div class="hgrid" id="similarGrid"></div>
    </div>
  </section>

  <div style="height:8px"></div>

</div>

<!-- STICKY CTA — single clean action, no WhatsApp/Call -->
<div class="detail-cta">
  <div class="detail-cta-price">
    <div class="lbl">From</div>
    <div class="amt" id="ctaPrice">—</div>
  </div>
  <button class="detail-cta-btn" id="ctaBtn">
    View contact details
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" width="15" height="15"><path d="m9 6 6 6-6 6"/></svg>
  </button>
</div>

<script src="data.js"></script>
<script src="location.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
